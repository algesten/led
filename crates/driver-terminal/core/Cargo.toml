[package]
name = "led-driver-terminal-core"
version = "0.0.0"
edition = "2024"
publish = false

# Sync core of the terminal driver — strictly isolated. Knows only
# about its own atom, its own ABI-crossing event types, the `Frame` /
# view-models `paint` consumes, and the sync `TerminalInputDriver` API.
# Has NO dependency on other drivers or on state-tabs.
#
# Render-time memos that build `Frame`s from multiple drivers' atoms
# live in `led-runtime`. The `paint` free fn and `RawModeGuard` live in
# `led-driver-terminal-native`.

[dependencies]
drv = { workspace = true }
# `BodyModel` carries syntax token kinds so the painter can colour
# each token run. The runtime produces the spans and hands them
# to the terminal driver via `BodyModel::Content::lines`.
led-state-syntax = { workspace = true }
# `BodyLine` also carries per-row diagnostic markers — gutter
# severity indicator + inline underline ranges. Pulled in for
# `DiagnosticSeverity`.
led-state-diagnostics = { workspace = true }
