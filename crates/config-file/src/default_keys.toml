# led keybindings
# Format: "key" = "action"
# Modifiers: ctrl, alt, shift (e.g. "ctrl+a")
# Sub-tables define chord prefixes (e.g. [keys."ctrl+x"])

[keys]
"ctrl+a" = "line_start"
"ctrl+e" = "line_end"
"ctrl+d" = "delete_forward"
"ctrl+k" = "kill_line"
"up" = "move_up"
"down" = "move_down"
"left" = "move_left"
"right" = "move_right"
"home" = "line_start"
"end" = "line_end"
"pageup" = "page_up"
"pagedown" = "page_down"
"ctrl+home" = "file_start"
"ctrl+end" = "file_end"
"enter" = "insert_newline"
"backspace" = "delete_backward"
"delete" = "delete_forward"
"tab" = "insert_tab"
"ctrl+f" = "open_file_search"
"ctrl+v" = "page_down"
"alt+v" = "page_up"
"alt+tab" = "toggle_focus"
"ctrl+b" = "toggle_side_panel"
"ctrl+left" = "prev_tab"
"ctrl+right" = "next_tab"
"ctrl+/" = "undo"
"ctrl+_" = "undo"
"ctrl+7" = "undo"
"ctrl+g" = "abort"
"esc" = "abort"
"ctrl+z" = "suspend"
"alt+<" = "file_start"
"alt+>" = "file_end"
"ctrl+space" = "set_mark"
"ctrl+w" = "kill_region"
"ctrl+y" = "yank"
"ctrl+s" = "in_buffer_search"
"alt+." = "lsp_next_diagnostic"
"alt+," = "lsp_prev_diagnostic"
"alt+enter" = "lsp_goto_definition"
"ctrl+r" = "lsp_rename"
"alt+i" = "lsp_code_action"
"ctrl+t" = "lsp_toggle_inlay_hints"
"alt+b" = "jump_back"
"alt+left" = "jump_back"
"alt+f" = "jump_forward"
"alt+right" = "jump_forward"
"alt+o" = "outline"
"alt+]" = "match_bracket"

[keys."ctrl+x"]
"ctrl+c" = "quit"
"ctrl+s" = "save"
"ctrl+a" = "save_no_format"
"ctrl+w" = "save_as"
"k" = "kill_buffer"
"ctrl+f" = "find_file"
"i" = "sort_imports"

[keys."ctrl+h"]
"e" = "open_messages"

[browser]
"left" = "collapse_dir"
"right" = "expand_dir"
"enter" = "open_selected"
"alt+enter" = "open_selected_bg"
"ctrl+q" = "collapse_all"

[file_search]
"alt+1" = "toggle_search_case"
"alt+2" = "toggle_search_regex"
"enter" = "open_selected"
