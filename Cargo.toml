[workspace]
resolver = "2"
members = ["led", "crates/core", "crates/buffer", "crates/file-browser", "crates/file-search"]

[workspace.dependencies]
ratatui = "0.30"
crossterm = "0.29"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
dirs = "6"
rusqlite = { version = "0.38.0", features = ["bundled"] }
notify = "7"
ropey = "1.6"
rmp-serde = "1"
twox-hash = "2"
led_core = { path = "crates/core" }
led_buffer = { path = "crates/buffer" }
libc = "0.2"
led_file_browser = { path = "crates/file-browser" }
led_file_search = { path = "crates/file-search" }
