[workspace]
resolver = "2"
members = ["led", "crates/core", "crates/buffer", "crates/file-browser", "crates/file-search", "crates/find-file", "crates/git-status"]

[workspace.dependencies]
ratatui = "0.30"
crossterm = { version = "0.29", features = ["event-stream"] }
tokio = { version = "1", features = ["rt", "macros", "sync", "time"] }
futures = "0.3"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
dirs = "6"
rusqlite = { version = "0.38.0", features = ["bundled"] }
notify = "7"
ropey = "1.6"
rmp-serde = "1"
twox-hash = "2"
led_core = { path = "crates/core" }
led_buffer = { path = "crates/buffer" }
libc = "0.2"
led_file_browser = { path = "crates/file-browser" }
led_file_search = { path = "crates/file-search" }
led_find_file = { path = "crates/find-file" }
tree-sitter = "0.25"
tree-sitter-rust = "0.23"
tree-sitter-toml-ng = "0.7"
tree-sitter-json = "0.24"
tree-sitter-javascript = "0.23"
tree-sitter-typescript = "0.23"
tree-sitter-md = "0.5"
tree-sitter-python = "0.25"
tree-sitter-bash = "0.25"
tree-sitter-swift = "0.7"
tree-sitter-c = "0.24"
tree-sitter-cpp = "0.23"
tree-sitter-make = "1.1"
similar = "2"
led_git_status = { path = "crates/git-status" }
git2 = { version = "0.20", features = ["vendored-libgit2"] }
