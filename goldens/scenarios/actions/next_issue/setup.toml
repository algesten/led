git_init = true

[[file]]
path = "main.rs"
contents = """
fn main() {
    let unused = 42;
    let another = 99;
}
"""

[fake_lsp]
[fake_lsp.diagnostics]
"main.rs" = [
  { range = { start = { line = 1, character = 8 }, end = { line = 1, character = 14 } }, severity = 2, message = "unused variable: `unused`" },
  { range = { start = { line = 2, character = 8 }, end = { line = 2, character = 15 } }, severity = 2, message = "unused variable: `another`" },
]
