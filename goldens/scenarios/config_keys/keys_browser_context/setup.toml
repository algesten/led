git_init = true

[[file]]
path = "alpha.txt"
contents = "alpha contents\n"

[[file]]
path = "beta.txt"
contents = "beta contents\n"

[[file]]
path = "subdir/inner.txt"
contents = "inner contents\n"

# Rebind browser-context movement to vi-style j/k. When the sidebar is
# focused, j moves selection down and k moves it up. In the main
# context j/k remain unbound (typing j in the editor still inserts 'j').
[config]
keys = """
[keys]
"ctrl+a" = "line_start"
"ctrl+e" = "line_end"
"up" = "move_up"
"down" = "move_down"
"left" = "move_left"
"right" = "move_right"
"home" = "line_start"
"end" = "line_end"
"enter" = "insert_newline"
"backspace" = "delete_backward"
"delete" = "delete_forward"
"tab" = "insert_tab"
"alt+tab" = "toggle_focus"
"ctrl+b" = "toggle_side_panel"
"ctrl+g" = "abort"
"esc" = "abort"

[keys."ctrl+x"]
"ctrl+c" = "quit"
"ctrl+s" = "save"

[browser]
"left" = "collapse_dir"
"right" = "expand_dir"
"enter" = "open_selected"
"j" = "move_down"
"k" = "move_up"
"""
